<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ping Pong JS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud">
        <div>
          <p class="label">Người chơi</p>
          <h1 id="playerScore">0</h1>
        </div>
        <div>
          <p class="label">Máy</p>
          <h1 id="cpuScore">0</h1>
        </div>
      </section>

      <canvas id="gameCanvas" width="900" height="500" aria-label="Game Ping Pong"></canvas>

      <section class="controls">
        <p>
          Di chuyển vợt bằng <strong>chuột</strong> hoặc phím <strong>W/S</strong>.
          Nhấn <strong>Space</strong> để tạm dừng / chơi tiếp.
        </p>
        <button id="restartBtn" type="button">Chơi lại</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
